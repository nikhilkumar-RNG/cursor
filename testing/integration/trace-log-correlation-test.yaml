apiVersion: v1
kind: ConfigMap
metadata:
  name: correlation-test-app
  namespace: monitoring
data:
  app.py: |
    #!/usr/bin/env python3
    """
    Test application for demonstrating trace-log correlation
    Generates traces with OpenTelemetry and logs with trace_id
    """
    import os
    import time
    import random
    import logging
    import json
    from datetime import datetime
    
    # OpenTelemetry imports
    from opentelemetry import trace
    from opentelemetry.sdk.trace import TracerProvider
    from opentelemetry.sdk.trace.export import BatchSpanProcessor
    from opentelemetry.exporter.otlp.proto.grpc.trace_exporter import OTLPSpanExporter
    from opentelemetry.sdk.resources import Resource
    
    # Setup logging
    logging.basicConfig(level=logging.INFO, format='%(message)s')
    logger = logging.getLogger(__name__)
    
    # Setup OpenTelemetry
    resource = Resource.create({"service.name": "correlation-test-app"})
    trace.set_tracer_provider(TracerProvider(resource=resource))
    tracer = trace.get_tracer(__name__)
    
    # Configure OTLP exporter to send to Tempo
    otlp_exporter = OTLPSpanExporter(
        endpoint="http://tempo.monitoring.svc.cluster.local:4317",
        insecure=True
    )
    span_processor = BatchSpanProcessor(otlp_exporter)
    trace.get_tracer_provider().add_span_processor(span_processor)
    
    def log_with_trace_context(level, message, **kwargs):
        """Log with trace context for correlation"""
        span = trace.get_current_span()
        span_context = span.get_span_context()
        
        log_entry = {
            "timestamp": datetime.utcnow().isoformat() + "Z",
            "level": level,
            "message": message,
            "trace_id": format(span_context.trace_id, '032x') if span_context.is_valid else "none",
            "span_id": format(span_context.span_id, '016x') if span_context.is_valid else "none",
            "service": "correlation-test-app",
            **kwargs
        }
        
        logger.info(json.dumps(log_entry))
    
    def process_payment(user_id, amount):
        """Simulate payment processing with nested spans"""
        with tracer.start_as_current_span("process_payment") as span:
            span.set_attribute("user.id", user_id)
            span.set_attribute("payment.amount", amount)
            
            log_with_trace_context("INFO", "Processing payment", user_id=user_id, amount=amount)
            
            # Simulate validation
            with tracer.start_as_current_span("validate_payment") as validation_span:
                validation_span.set_attribute("validation.type", "credit_card")
                time.sleep(random.uniform(0.05, 0.15))
                log_with_trace_context("INFO", "Payment validated")
            
            # Simulate database call
            with tracer.start_as_current_span("database_query") as db_span:
                db_span.set_attribute("db.system", "postgresql")
                db_span.set_attribute("db.operation", "INSERT")
                time.sleep(random.uniform(0.1, 0.3))
                
                # 10% chance of error
                if random.random() < 0.1:
                    log_with_trace_context("ERROR", "Database timeout", error="connection timeout")
                    db_span.set_status(trace.Status(trace.StatusCode.ERROR, "Database timeout"))
                    raise Exception("Database timeout")
                
                log_with_trace_context("INFO", "Payment saved to database")
            
            # Simulate external API call
            with tracer.start_as_current_span("notify_user") as notify_span:
                notify_span.set_attribute("notification.type", "email")
                time.sleep(random.uniform(0.2, 0.5))
                log_with_trace_context("INFO", "User notified", notification_type="email")
            
            log_with_trace_context("INFO", "Payment processed successfully", status="success")
            return True
    
    def handle_request():
        """Simulate handling a user request"""
        user_id = random.randint(1, 1000)
        amount = round(random.uniform(10, 1000), 2)
        
        with tracer.start_as_current_span("handle_request") as span:
            span.set_attribute("http.method", "POST")
            span.set_attribute("http.route", "/api/payment")
            span.set_attribute("user.id", user_id)
            
            log_with_trace_context("INFO", "Request received", endpoint="/api/payment", user_id=user_id)
            
            try:
                process_payment(user_id, amount)
                log_with_trace_context("INFO", "Request completed", status_code=200)
            except Exception as e:
                log_with_trace_context("ERROR", "Request failed", error=str(e), status_code=500)
                span.set_status(trace.Status(trace.StatusCode.ERROR, str(e)))
    
    if __name__ == "__main__":
        print("Starting correlation test application...")
        print("Sending traces to Tempo and logs to stdout (captured by Promtail)")
        
        while True:
            handle_request()
            time.sleep(random.uniform(1, 3))
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: correlation-test-app
  namespace: monitoring
  labels:
    app: correlation-test-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: correlation-test-app
  template:
    metadata:
      labels:
        app: correlation-test-app
    spec:
      containers:
      - name: app
        image: python:3.11-slim
        command:
          - /bin/bash
          - -c
          - |
            pip install --quiet opentelemetry-api opentelemetry-sdk opentelemetry-exporter-otlp-proto-grpc
            python /app/app.py
        volumeMounts:
        - name: app
          mountPath: /app
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
      volumes:
      - name: app
        configMap:
          name: correlation-test-app
