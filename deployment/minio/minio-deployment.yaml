apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-pvc
  namespace: monitoring
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: monitoring
  labels:
    app: minio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
      - name: minio
        image: minio/minio:RELEASE.2024-01-01T16-36-33Z
        imagePullPolicy: IfNotPresent
        args:
          - server
          - /data
          - --console-address
          - ":9001"
        env:
        - name: MINIO_ROOT_USER
          value: "minioadmin"
        - name: MINIO_ROOT_PASSWORD
          value: "minioadmin"
        - name: MINIO_REGION_NAME
          value: "us-east-1"
        ports:
        - containerPort: 9000
          name: api
          protocol: TCP
        - containerPort: 9001
          name: console
          protocol: TCP
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 2Gi
        volumeMounts:
        - name: data
          mountPath: /data
        livenessProbe:
          httpGet:
            path: /minio/health/live
            port: 9000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /minio/health/ready
            port: 9000
          initialDelaySeconds: 30
          periodSeconds: 10
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: minio-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: monitoring
  labels:
    app: minio
spec:
  type: ClusterIP
  ports:
  - port: 9000
    targetPort: 9000
    protocol: TCP
    name: api
  - port: 9001
    targetPort: 9001
    protocol: TCP
    name: console
  selector:
    app: minio
---
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-setup
  namespace: monitoring
spec:
  template:
    metadata:
      name: minio-setup
    spec:
      restartPolicy: OnFailure
      containers:
      - name: mc
        image: minio/mc:RELEASE.2024-01-01T16-36-33Z
        command:
          - /bin/sh
          - -c
          - |
            #!/bin/sh
            set -e
            echo "Waiting for MinIO to be ready..."
            sleep 30
            
            mc alias set myminio http://minio.monitoring.svc.cluster.local:9000 minioadmin minioadmin
            
            # Create buckets
            mc mb myminio/loki-data --ignore-existing
            mc mb myminio/tempo-data --ignore-existing
            
            # Set lifecycle policies for 30-day retention
            cat <<EOF > /tmp/loki-lifecycle.json
            {
              "Rules": [
                {
                  "Expiration": {
                    "Days": 30
                  },
                  "ID": "loki-retention-30d",
                  "Status": "Enabled"
                }
              ]
            }
            EOF
            
            cat <<EOF > /tmp/tempo-lifecycle.json
            {
              "Rules": [
                {
                  "Expiration": {
                    "Days": 30
                  },
                  "ID": "tempo-retention-30d",
                  "Status": "Enabled"
                }
              ]
            }
            EOF
            
            mc ilm import myminio/loki-data < /tmp/loki-lifecycle.json
            mc ilm import myminio/tempo-data < /tmp/tempo-lifecycle.json
            
            # Create users for Loki and Tempo
            mc admin user add myminio loki-admin loki-secret-key-change-me
            mc admin user add myminio tempo-admin tempo-secret-key-change-me
            
            # Set policies
            mc admin policy set myminio readwrite user=loki-admin
            mc admin policy set myminio readwrite user=tempo-admin
            
            echo "MinIO setup completed successfully"
