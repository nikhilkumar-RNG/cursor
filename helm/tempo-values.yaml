tempo:
  server:
    http_listen_port: 3200
  storage:
    trace:
      backend: s3
      s3:
        bucket: tempo
        endpoint: minio.observability.svc.cluster.local:9000
        access_key: ${S3_ACCESS_KEY:minio}
        secret_key: ${S3_SECRET_KEY:minio123}
        insecure: true
        s3forcepathstyle: true
  metricsGenerator:
    enabled: true
  compactor:
    compaction:
      block_retention: 720h

image:
  repository: grafana/tempo
  tag: latest

ingester:
  replicas: 1
  persistence:
    enabled: true
    size: 20Gi

serviceMonitor:
  enabled: true
