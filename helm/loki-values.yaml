loki:
  analytics:
    reporting_enabled: false
  server:
    http_listen_port: 3100
  commonConfig:
    replication_factor: 1
  auth_enabled: false

  storage_config:
    aws:
      s3: "http://minio.observability.svc.cluster.local:9000"
      s3forcepathstyle: true
      bucketnames: loki
      access_key_id: "${S3_ACCESS_KEY:minio}"
      secret_access_key: "${S3_SECRET_KEY:minio123}"
      insecure: true
    boltdb_shipper:
      shared_store: s3
      active_index_directory: /data/loki/index
      cache_location: /data/loki/boltdb-cache
      cache_ttl: 168h
    index_gateway:
      mode: simple

  schema_config:
    configs:
      - from: 2024-01-01
        store: boltdb-shipper
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

  ruler:
    alertmanager_url: http://alertmanager.observability.svc.cluster.local:9093

  compactor:
    working_directory: /data/compactor
    shared_store: s3

  limits_config:
    retention_period: 0s
    allow_structured_metadata: true
    ingestion_rate_mb: 16
    ingestion_burst_size_mb: 32

  chunk_store_config:
    max_look_back_period: 720h

  table_manager:
    retention_deletes_enabled: false
    retention_period: 0s

singleBinary:
  enabled: true
  replicas: 1
  persistence:
    enabled: true
    storageClass: ""
    size: 50Gi
  extraEnv:
    - name: S3_ACCESS_KEY
      valueFrom:
        secretKeyRef:
          name: loki-s3
          key: access_key
    - name: S3_SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: loki-s3
          key: secret_key

serviceMonitor:
  enabled: true

ingress:
  enabled: false

gateway:
  enabled: false

compactor:
  enabled: true

indexGateway:
  enabled: false

resultsCache:
  enabled: true
