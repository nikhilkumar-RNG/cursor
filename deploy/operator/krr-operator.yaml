apiVersion: v1
kind: Namespace
metadata:
  name: krr-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: krr-operator
  namespace: krr-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: krr-operator
rules:
  - apiGroups: ["restart.krr.sh"]
    resources: ["restartrequests", "restartrequests/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: ["kafka.strimzi.io"]
    resources: ["kafkas"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: ["postgres-operator.crunchydata.com"]
    resources: ["postgresclusters"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: krr-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: krr-operator
subjects:
  - kind: ServiceAccount
    name: krr-operator
    namespace: krr-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: krr-operator
  namespace: krr-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: krr-operator
  template:
    metadata:
      labels:
        app: krr-operator
    spec:
      serviceAccountName: krr-operator
      containers:
        - name: manager
          image: ghcr.io/your-org/krr-operator:latest
          imagePullPolicy: IfNotPresent
          command:
            - python
          args:
            - -m
            - krr_operator
          env:
            - name: KRR_LOG_LEVEL
              value: INFO
            - name: KRR_RESTART_ANNOTATION
              value: krr.sh/restartedAt
            - name: KRR_READINESS_TIMEOUT_SECONDS
              value: "900"
            - name: KRR_READINESS_POLL_SECONDS
              value: "5"
