apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: monitoring
data:
  loki.yaml: |
    auth_enabled: false

    server:
      http_listen_port: 3100
      grpc_listen_port: 9095
      log_level: info

    # Distributed mode configuration
    distributor:
      ring:
        kvstore:
          store: memberlist

    ingester:
      # Lifecycle configuration
      lifecycler:
        ring:
          kvstore:
            store: memberlist
          replication_factor: 1
        final_sleep: 0s
      # Chunk configuration - optimize for compression
      chunk_idle_period: 5m
      chunk_block_size: 262144  # 256KB
      chunk_retain_period: 30s
      max_transfer_retries: 0
      wal:
        enabled: true
        dir: /loki/wal

    memberlist:
      join_members:
        - loki-memberlist

    # Schema configuration with boltdb-shipper
    schema_config:
      configs:
        - from: 2024-01-01
          store: boltdb-shipper
          object_store: s3
          schema: v11
          index:
            prefix: loki_index_
            period: 24h

    # Storage configuration with S3/MinIO backend
    storage_config:
      boltdb_shipper:
        active_index_directory: /loki/index
        cache_location: /loki/boltdb-cache
        shared_store: s3
        cache_ttl: 24h
      
      aws:
        s3: s3://loki-data
        endpoint: minio.monitoring.svc.cluster.local:9000
        bucketnames: loki-data
        access_key_id: ${MINIO_ACCESS_KEY}
        secret_access_key: ${MINIO_SECRET_KEY}
        s3forcepathstyle: true
        insecure: true

    # Chunk storage configuration
    chunk_store_config:
      max_look_back_period: 0s
      chunk_cache_config:
        enable_fifocache: true
        fifocache:
          max_size_bytes: 1GB
          ttl: 24h

    # Compactor for retention and cleanup
    compactor:
      working_directory: /loki/compactor
      shared_store: s3
      compaction_interval: 10m
      retention_enabled: true
      retention_delete_delay: 2h
      retention_delete_worker_count: 150

    # Retention configuration - 30 days
    limits_config:
      enforce_metric_name: false
      reject_old_samples: true
      reject_old_samples_max_age: 168h  # 7 days
      ingestion_rate_mb: 50
      ingestion_burst_size_mb: 100
      max_query_series: 10000
      max_query_parallelism: 32
      retention_period: 720h  # 30 days
      max_cache_freshness_per_query: 10m
      split_queries_by_interval: 15m

    # Query frontend configuration
    query_range:
      align_queries_with_step: true
      max_retries: 5
      parallelise_shardable_queries: true
      cache_results: true
      results_cache:
        cache:
          enable_fifocache: true
          fifocache:
            max_size_bytes: 500MB
            ttl: 24h

    # Ruler configuration for alerting
    ruler:
      storage:
        type: local
        local:
          directory: /loki/rules
      rule_path: /tmp/rules
      alertmanager_url: http://alertmanager.monitoring.svc.cluster.local:9093
      ring:
        kvstore:
          store: memberlist
      enable_api: true
      enable_alertmanager_v2: true

    # Table manager for lifecycle
    table_manager:
      retention_deletes_enabled: true
      retention_period: 720h  # 30 days

    # Analytics
    analytics:
      reporting_enabled: false
