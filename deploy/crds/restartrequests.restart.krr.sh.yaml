apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: restartrequests.restart.krr.sh
spec:
  group: restart.krr.sh
  names:
    plural: restartrequests
    singular: restartrequest
    kind: RestartRequest
    shortNames:
      - rrq
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - target
              properties:
                reason:
                  type: string
                  maxLength: 256
                dryRun:
                  type: boolean
                labels:
                  type: object
                  additionalProperties:
                    type: string
                target:
                  type: object
                  required:
                    - kind
                    - name
                  properties:
                    kind:
                      type: string
                      enum:
                        - Deployment
                        - StatefulSet
                        - DaemonSet
                        - StrimziKafka
                        - PostgresCluster
                    name:
                      type: string
                    namespace:
                      type: string
                    apiVersion:
                      type: string
                    plural:
                      type: string
                strategy:
                  type: object
                  properties:
                    type:
                      type: string
                      enum:
                        - rolling
                        - full
                    waitForRollout:
                      type: boolean
                    timeoutSeconds:
                      type: integer
                      minimum: 30
                      maximum: 7200
                    pollIntervalSeconds:
                      type: integer
                      minimum: 1
                      maximum: 60
            status:
              type: object
              properties:
                phase:
                  type: string
                lastRestartAt:
                  type: string
                  format: date-time
                message:
                  type: string
                specHash:
                  type: string
      subresources:
        status: {}
