config:
  clients:
    - url: http://loki.observability.svc.cluster.local:3100/loki/api/v1/push
  snippets:
    pipelineStages:
      - cri: {}
      - docker: {}
      - json:
          expressions:
            traceid: traceid
            trace_id: trace_id
            traceId: traceId
      - labels:
          traceid:
          trace_id:
          traceId:
  lokiAddress: "http://loki:3100/loki/api/v1/push"

promtail:
  enabled: true
  serviceMonitor:
    enabled: true

extraScrapeConfigs: |
  - job_name: kubernetes-pods
    pipeline_stages:
      - match:
          selector: '{app!="", namespace!=""}'
          stages:
            - regex:
                expression: 'trace(?:id|Id|_id)=(?P<traceid>[a-f0-9\-]+)'
            - labels:
                traceid:
    kubernetes_sd_configs:
      - role: pod
    relabel_configs:
      - action: replace
        source_labels: [__meta_kubernetes_pod_label_app]
        target_label: app
      - action: replace
        source_labels: [__meta_kubernetes_namespace]
        target_label: namespace
      - action: replace
        source_labels: [__meta_kubernetes_pod_name]
        target_label: pod
