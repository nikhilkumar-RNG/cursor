apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: monitoring
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0
      log_level: info

    positions:
      filename: /tmp/positions.yaml

    clients:
      - url: http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push
        tenant_id: 1
        backoff_config:
          min_period: 100ms
          max_period: 10s
          max_retries: 10
        batchsize: 1048576  # 1MB
        batchwait: 1s
        timeout: 10s

    scrape_configs:
      # Scrape pod logs via /var/log/pods
      - job_name: kubernetes-pods
        pipeline_stages:
          - cri: {}
          - labeldrop:
              - filename
          - json:
              expressions:
                output: log
                stream: stream
                timestamp: time
          - labels:
              stream:
          - timestamp:
              source: timestamp
              format: RFC3339Nano
          - output:
              source: output

        kubernetes_sd_configs:
          - role: pod
        
        relabel_configs:
          # Add namespace label
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          
          # Add pod name label
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          
          # Add container name label
          - source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container
          
          # Add app label if exists
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: app
          
          # Add node name
          - source_labels: [__meta_kubernetes_pod_node_name]
            target_label: node
          
          # Add pod UID
          - source_labels: [__meta_kubernetes_pod_uid]
            target_label: pod_uid
          
          # Set log path
          - source_labels:
              - __meta_kubernetes_pod_uid
              - __meta_kubernetes_pod_container_name
            target_label: __path__
            separator: /
            replacement: /var/log/pods/*$1/*.log

      # Scrape logs from /var/log/containers
      - job_name: kubernetes-containers
        kubernetes_sd_configs:
          - role: pod

        pipeline_stages:
          - cri: {}
          - match:
              selector: '{namespace!=""}'
              stages:
                - json:
                    expressions:
                      log: log
                      stream: stream
                - output:
                    source: log

        relabel_configs:
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: app
          - source_labels: [__meta_kubernetes_pod_label_component]
            target_label: component
          - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_pod_name, __meta_kubernetes_pod_container_name]
            target_label: __path__
            separator: /
            replacement: /var/log/containers/$1_$2_$3-*.log

      # Scrape system logs
      - job_name: system
        static_configs:
          - targets:
              - localhost
            labels:
              job: systemd-journal
              host: ${HOSTNAME}
              __path__: /var/log/syslog

    limits_config:
      readline_rate_enabled: true
      readline_rate: 10000
      readline_burst: 20000
